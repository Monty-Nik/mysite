<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Приложение для опросов{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'polls:post_list' %}">Главная</a>
            {% if user.is_authenticated %}
                <a href="{% url 'polls:post_create' %}">Создать опрос</a>
                <a href="{% url 'profile' %}">Профиль ({{ user.username }})</a>
                <a href="{% url 'logout' %}">Выход</a>
            {% else %}
                <a href="{% url 'login' %}">Вход</a>
                <a href="{% url 'register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
            {% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 Монолитное приложение для опросов</p>
    </footer>
</body>
</html>
